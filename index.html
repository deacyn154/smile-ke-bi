<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微笑客经营看板</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
:root {
    --bg: #0f1117;
    --card: #1a1d29;
    --border: #2a2d3a;
    --text: #e8eaf0;
    --text-dim: #8b8fa3;
    --accent: #6C8EF2;
    --green: #5AD8A6;
    --yellow: #F6BD16;
    --red: #E86452;
    --blue: #5B8FF9;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
.dashboard {
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px;
}
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
}
.header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--blue), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.filters {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 24px;
}
.filter-group { display: flex; align-items: center; gap: 8px; }
.filter-group label { color: var(--text-dim); font-size: 13px; font-weight: 500; white-space: nowrap; }
.filter-group select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 13px; outline: none;
}
.filter-group select:focus { border-color: var(--accent); }
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}
.kpi-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    transition: transform 0.2s, box-shadow 0.2s;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.kpi-label { color: var(--text-dim); font-size: 13px; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.kpi-sub { font-size: 12px; margin-top: 6px; }
.accent .kpi-value { color: var(--accent); }
.green .kpi-value { color: var(--green); }
.yellow .kpi-value { color: var(--yellow); }
.red .kpi-value { color: var(--red); }
.blue .kpi-value { color: var(--blue); }
.tab-nav {
    display: flex; gap: 4px; margin-bottom: 20px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 4px;
}
.tab-btn {
    flex: 1; padding: 10px 16px; border: none; background: transparent;
    color: var(--text-dim); font-size: 14px; font-weight: 500;
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
}
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-btn:hover:not(.active) { background: rgba(108,142,242,0.1); color: var(--text); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.chart-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
}
.chart-section h3 { font-size: 15px; margin-bottom: 16px; color: var(--text-dim); }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
    text-align: left; padding: 10px 12px; background: var(--bg);
    color: var(--text-dim); font-weight: 600; border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
}
td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
tr:hover td { background: rgba(108,142,242,0.05); }
.table-wrap { max-height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--border); }
.badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: 500;
}
.badge-warn { background: rgba(232,100,82,0.15); color: var(--red); }
.badge-ok { background: rgba(90,216,166,0.15); color: var(--green); }
@media (max-width: 900px) {
    .row { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>📊 微笑客经营看板</h1>
        <div class="update-time" id="updateTime"></div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>📅 日期:</label>
            <select id="dateFrom"></select>
            <span style="color:var(--text-dim)">~</span>
            <select id="dateTo"></select>
        </div>
        <div class="filter-group">
            <label>🏪 门店:</label>
            <select id="storeSelect" multiple size="3"></select>
        </div>
        <div class="filter-group">
            <label>📡 渠道:</label>
            <select id="channelSelect" multiple size="3"></select>
        </div>
        <div class="filter-group">
            <button onclick="selectAllStores()" style="background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;">全选</button>
            <button onclick="deselectAllStores()" style="background:var(--border);color:var(--text);border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;">清空</button>
        </div>
    </div>

    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('store',this)">门店经营</button>
        <button class="tab-btn" onclick="switchTab('channel',this)">渠道分析</button>
        <button class="tab-btn" onclick="switchTab('neg',this)">负毛利分析</button>
        <button class="tab-btn" onclick="switchTab('promo',this)">推广分析</button>
    </div>

    <div id="tab-store" class="tab-content active">
        <div class="chart-section">
            <h3>各门店营收 vs 真实毛利</h3>
            <div id="chartStoreBar"></div>
        </div>
        <div class="chart-section">
            <h3>门店明细</h3>
            <div class="table-wrap" id="storeTable"></div>
        </div>
    </div>

    <div id="tab-channel" class="tab-content">
        <div class="row">
            <div class="chart-section">
                <h3>单量渠道分布</h3>
                <div id="chartChannelPie"></div>
            </div>
            <div class="chart-section">
                <h3>各渠道毛利率</h3>
                <div id="chartChannelMargin"></div>
            </div>
        </div>
        <div class="row">
            <div class="chart-section">
                <h3>各渠道营收</h3>
                <div id="chartChannelRev"></div>
            </div>
            <div class="chart-section">
                <h3>各渠道真实毛利</h3>
                <div id="chartChannelProfit"></div>
            </div>
        </div>
        <div class="chart-section">
            <h3>渠道明细</h3>
            <div class="table-wrap" id="channelTable"></div>
        </div>
    </div>

    <div id="tab-neg" class="tab-content">
        <div class="chart-section">
            <h3>门店 × 渠道 负毛利占比热力图</h3>
            <div id="chartNegHeatmap"></div>
        </div>
        <div class="chart-section">
            <h3>负毛利占比 TOP 门店</h3>
            <div class="table-wrap" id="negTable"></div>
        </div>
    </div>

    <div id="tab-promo" class="tab-content">
        <div class="chart-section">
            <h3>各门店推广费排名</h3>
            <div id="chartPromoBar"></div>
        </div>
        <div class="chart-section">
            <h3>渠道推广汇总</h3>
            <div class="table-wrap" id="promoTable"></div>
        </div>
    </div>
</div>

// --- Filters ---
const dateFrom = document.getElementById('dateFrom');

const channelSelect = document.getElementById('channelSelect');

function initFilters() {
    allDates.forEach(d => {
        dateFrom.innerHTML += '<option value="' + d + '">' + d + '</option>';
        dateTo.innerHTML += '<option value="' + d + '">' + d + '</option>';
    });
    dateTo.value = allDates[allDates.length - 1];
    allStores.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s; opt.selected = true;
        storeSelect.appendChild(opt);
    });
    allChannels.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c; opt.selected = true;
        channelSelect.appendChild(opt);
    });
}

function getSelected(sel) { return [...sel.selectedOptions].map(o => o.value); }
function selectAllStores() { [...storeSelect.options].forEach(o => o.selected = true); refresh(); }
function deselectAllStores() { [...storeSelect.options].forEach(o => o.selected = false); refresh(); }

function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
}

// --- Helpers ---
function sum(arr, key) { return arr.reduce((s, r) => s + (r[key] || 0), 0); }

function groupBy(arr, keys) {
    const map = {};
    arr.forEach(r => {
        const k = keys.map(k2 => r[k2]).join('|');
        if (!map[k]) { map[k] = {}; keys.forEach(kk => map[k][kk] = r[kk]); map[k]._rows = []; }
        map[k]._rows.push(r);
    });
    return Object.values(map).map(g => {
        const result = {};
        keys.forEach(kk => result[kk] = g[kk]);
        g._rows.forEach(r => {
            Object.keys(r).forEach(k => {
                if (!keys.includes(k)) result[k] = (result[k] || 0) + (r[k] || 0);
            });
        });
        return result;
    });
}

function getFilteredData() {
    const from = dateFrom.value, to = dateTo.value;
    const stores = getSelected(storeSelect), channels = getSelected(channelSelect);
    return rawData.filter(r =>
        r['日期'] >= from && r['日期'] <= to &&
        stores.includes(r['store_name']) &&
        channels.includes(r['channel'])
    );
}

function getFilteredPromo() {
    const from = dateFrom.value, to = dateTo.value;
    const stores = getSelected(storeSelect);
    return promoData.filter(r =>
        r['日期'] >= from && r['日期'] <= to &&
        stores.includes(r['store_name'])
    );
}

// --- KPIs ---
function renderKPIs(data) {
    const orders = sum(data, 'order_cnt');
    const revenue = sum(data, 'revenue');
    const promo = sum(data, 'promo_fee');
    const realProfit = sum(data, 'real_profit');
    const negCnt = sum(data, 'neg_cnt');
    const margin = revenue > 0 ? (realProfit / revenue * 100).toFixed(1) : 0;
    const negPct = orders > 0 ? (negCnt / orders * 100).toFixed(1) : 0;
    const aov = orders > 0 ? (revenue / orders).toFixed(1) : 0;
    const negClass = negPct > 25 ? 'red' : 'green';
    const negText = negPct > 25 ? '需关注' : '正常';
    document.getElementById('kpiGrid').innerHTML =
        '<div class="kpi-card blue"><div class="kpi-label">总单量</div><div class="kpi-value">' + orders.toLocaleString() + '</div></div>' +
        '<div class="kpi-card accent"><div class="kpi-label">总营收</div><div class="kpi-value">¥' + revenue.toLocaleString(undefined,{maximumFractionDigits:0}) + '</div></div>' +
        '<div class="kpi-card green"><div class="kpi-label">真实毛利</div><div class="kpi-value">¥' + realProfit.toLocaleString(undefined,{maximumFractionDigits:0}) + '</div><div class="kpi-sub" style="color:var(--red)">-¥' + promo.toFixed(0) + ' 推广</div></div>' +
        '<div class="kpi-card yellow"><div class="kpi-label">真实毛利率</div><div class="kpi-value">' + margin + '%</div></div>' +
        '<div class="kpi-card accent"><div class="kpi-label">客单价</div><div class="kpi-value">¥' + aov + '</div></div>' +
        '<div class="kpi-card ' + negClass + '"><div class="kpi-label">负毛利占比</div><div class="kpi-value">' + negPct + '%</div><div class="kpi-sub"><span class="badge badge-' + (negPct > 25 ? 'warn' : 'ok') + '">' + negText + '</span></div></div>';
}

    stores.sort((a, b) => b.real_profit - a.real_profit);
    const names = stores.map(s => s.store_name);

    Plotly.newPlot('chartStoreBar', [

        { x: names, y: profits, name: '真实毛利', type: 'bar', marker: { color: '#5AD8A6' } }
    ], { ...plotlyLayout, barmode: 'group', xaxis: { ...plotlyLayout.xaxis, tickangle: -45 }, margin: { l: 60, r: 20, t: 30, b: 120 } }, plotlyCfg);

    let html = '<table><tr><th>门店</th><th>单量</th><th>营收</th><th>真实毛利</th><th>推广费</th><th>毛利率(%)</th><th>负毛利占比</th></tr>';
    stores.forEach(s => {
        const rev = s.revenue || 0, rp = s.real_profit || 0;
        const mg = rev > 0 ? (rp / rev * 100).toFixed(1) : '0.0';
        const np = s.order_cnt > 0 ? ((s.neg_cnt || 0) / s.order_cnt * 100).toFixed(1) : '0.0';
        html += '<tr><td>' + s.store_name + '</td><td>' + (s.order_cnt||0).toLocaleString() + '</td><td>¥' + rev.toLocaleString(undefined,{maximumFractionDigits:0}) + '</td><td>¥' + rp.toLocaleString(undefined,{maximumFractionDigits:0}) + '</td><td>¥' + ((s.promo_fee||0).toFixed(0)) + '</td><td>' + mg + '%</td><td><span class="badge badge-' + (np > 25 ? 'warn' : 'ok') + '">' + np + '%</span></td></tr>';
    });
    html += '</table>';
    document.getElementById('storeTable').innerHTML = html;
}

// --- Channel Tab ---
function renderChannel(data) {
    const channels = groupBy(data, ['channel']);
    const totalOrders = channels.reduce((s, c) => s + c.order_cnt, 0);
    channels.forEach(c => { c.order_pct = totalOrders > 0 ? (c.order_cnt / totalOrders * 100).toFixed(1) : '0.0'; });

    Plotly.newPlot('chartChannelPie', [{
        values: channels.map(c => c.order_cnt), labels: channels.map(c => c.channel),
        type: 'pie', hole: 0.45,
        marker: { colors: ['#5B8FF9','#F6BD16','#5AD8A6','#E86452'] },
        textinfo: 'label+percent', textposition: 'outside'
    }], { ...plotlyLayout, height: 380, showlegend: false }, plotlyCfg);

    const chRev = [...channels].sort((a,b) => b.revenue - a.revenue);
    Plotly.newPlot('chartChannelRev', [{
        y: chRev.map(c => c.channel), x: chRev.map(c => c.revenue),
        type: 'bar', orientation: 'h', marker: { color: '#5B8FF9' }
    }], { ...plotlyLayout, height: 380, xaxis: { ...plotlyLayout.xaxis, title: '营收(元)' }, margin: { l: 100, r: 20, t: 10, b: 40 } }, plotlyCfg);

    const chProfit = [...channels].sort((a,b) => b.real_profit - a.real_profit);
    Plotly.newPlot('chartChannelProfit', [{
        y: chProfit.map(c => c.channel), x: chProfit.map(c => c.real_profit),
        type: 'bar', orientation: 'h', marker: { color: '#5AD8A6' }
    }], { ...plotlyLayout, height: 380, xaxis: { ...plotlyLayout.xaxis, title: '真实毛利(元)' }, margin: { l: 100, r: 20, t: 10, b: 40 } }, plotlyCfg);

    const chMargin = [...channels].sort((a,b) => (b.real_profit/(b.revenue||1)) - (a.real_profit/(a.revenue||1)));
    Plotly.newPlot('chartChannelMargin', [{
        y: chMargin.map(c => c.channel), x: chMargin.map(c => c.revenue > 0 ? (c.real_profit/c.revenue*100).toFixed(1) : 0),
        type: 'bar', orientation: 'h', marker: { color: '#F6BD16' }
    }], { ...plotlyLayout, height: 380, xaxis: { ...plotlyLayout.xaxis, title: '毛利率(%)' }, margin: { l: 100, r: 20, t: 10, b: 40 } }, plotlyCfg);

    let html = '<table><tr><th>渠道</th><th>单量</th><th>占比(%)</th><th>营收</th><th>真实毛利</th><th>推广费</th><th>毛利率(%)</th><th>负毛利占比</th></tr>';
    channels.forEach(c => {
        const rev = c.revenue || 0, rp = c.real_profit || 0;
        const mg = rev > 0 ? (rp / rev * 100).toFixed(1) : '0.0';
        const np = c.order_cnt > 0 ? ((c.neg_cnt||0) / c.order_cnt * 100).toFixed(1) : '0.0';
        html += '<tr><td>' + c.channel + '</td><td>' + c.order_cnt.toLocaleString() + '</td><td>' + c.order_pct + '%</td><td>¥' + rev.toLocaleString(undefined,{maximumFractionDigits:0}) + '</td><td>¥' + rp.toLocaleString(undefined,{maximumFractionDigits:0}) + '</td><td>¥' + ((c.promo_fee||0).toFixed(0)) + '</td><td>' + mg + '%</td><td><span class="badge badge-' + (np > 25 ? 'warn' : 'ok') + '">' + np + '%</span></td></tr>';
    });
    html += '</table>';
    document.getElementById('channelTable').innerHTML = html;
}

// --- Neg Tab ---
function renderNeg(data) {
    const storeSet = new Set(), channelSet = new Set();
    const matrix = {};
    data.forEach(r => {
        storeSet.add(r.store_name);
        channelSet.add(r.channel);
        const k = r.store_name + '||' + r.channel;
        if (!matrix[k]) matrix[k] = { sum: 0, cnt: 0 };
        matrix[k].sum += r.order_cnt > 0 ? (r.neg_cnt / r.order_cnt * 100) : 0;
        matrix[k].cnt += 1;
    });
    const stores = [...storeSet].sort();
    const channels = [...channelSet].sort();
    const z = stores.map(s => channels.map(c => {
        const v = matrix[s+'||'+c]; return v ? Math.round(v.sum / v.cnt * 10)/10 : 0;
    }));
    Plotly.newPlot('chartNegHeatmap', [{
        z: z, x: channels, y: stores,
        type: 'heatmap',
        colorscale: [[0,'#5AD8A6'],[0.5,'#F6BD16'],[1,'#E86452']],
        hovertemplate: '%{y} | %{x}<br>负毛利占比: %{z}%<extra></extra>'
    }], { ...plotlyLayout, height: Math.max(400, stores.length*28), xaxis: { ...plotlyLayout.xaxis, side: 'top' }, margin: { l: 120, r: 20, t: 60, b: 40 } }, plotlyCfg);

    const storeData = groupBy(data, ['store_name']);
    storeData.forEach(s => { s.neg_pct = s.order_cnt > 0 ? (s.neg_cnt / s.order_cnt * 100) : 0; });
    storeData.sort((a,b) => b.neg_pct - a.neg_pct);
    let html = '<table><tr><th>排名</th><th>门店</th><th>总单量</th><th>负毛利单数</th><th>负毛利占比</th><th>真实毛利</th></tr>';
    storeData.slice(0,10).forEach((s, i) => {
        html += '<tr><td>' + (i+1) + '</td><td>' + s.store_name + '</td><td>' + s.order_cnt.toLocaleString() + '</td><td>' + (s.neg_cnt||0) + '</td><td><span class="badge badge-' + (s.neg_pct > 25 ? 'warn' : 'ok') + '">' + s.neg_pct.toFixed(1) + '%</span></td><td>¥' + (s.real_profit||0).toLocaleString(undefined,{maximumFractionDigits:0}) + '</td></tr>';
    });
    html += '</table>';
    document.getElementById('negTable').innerHTML = html;
}

// --- Promo Tab ---
function renderPromo(pdata) {
    if (!pdata.length) {
        document.getElementById('chartPromoBar').innerHTML = '<p style="color:var(--text-dim);padding:40px;text-align:center;">暂无推广数据</p>';
        document.getElementById('promoTable').innerHTML = '';
        return;
    }
    const storeMap = {};
    pdata.forEach(r => { storeMap[r.store_name] = (storeMap[r.store_name] || 0) + (r.promo_fee || 0); });
    const sorted = Object.entries(storeMap).sort((a,b) => b[1] - a[1]).slice(0,15);
    Plotly.newPlot('chartPromoBar', [{
        y: sorted.map(s => s[0]), x: sorted.map(s => s[1]),
        type: 'bar', orientation: 'h',
        marker: { color: sorted.map(s => s[1] > 100 ? '#E86452' : s[1] > 50 ? '#F6BD16' : '#5AD8A6') }
    }], { ...plotlyLayout, height: Math.max(380, sorted.length*28), xaxis: { ...plotlyLayout.xaxis, title: '推广费(元)' }, margin: { l: 120, r: 20, t: 10, b: 40 } }, plotlyCfg);

    const chMap = {}, chStores = {};
    pdata.forEach(r => {
        chMap[r.channel] = (chMap[r.channel] || 0) + (r.promo_fee || 0);
        if (!chStores[r.channel]) chStores[r.channel] = new Set();
        chStores[r.channel].add(r.store_name);
    });
    let html = '<table><tr><th>渠道</th><th>推广费合计</th><th>投放门店数</th></tr>';
    Object.entries(chMap).sort((a,b) => b[1]-a[1]).forEach(([ch,fee]) => {
        html += '<tr><td>' + ch + '</td><td>¥' + fee.toFixed(2) + '</td><td>' + chStores[ch].size + '</td></tr>';
    });
    html += '</table>';
    document.getElementById('promoTable').innerHTML = html;
}

// --- Refresh ---
function refresh() {
    const data = getFilteredData();
    const pf = getFilteredPromo();
    renderKPIs(data);
    renderStore(data);
    renderChannel(data);
    renderNeg(data);
    renderPromo(pf);
}

// --- Init ---
initFilters();
document.getElementById('updateTime').textContent = '数据更新: ' + allDates[allDates.length - 1];
[dateFrom, dateTo, storeSelect, channelSelect].forEach(el => el.addEventListener('change', refresh));
refresh();
</script>
